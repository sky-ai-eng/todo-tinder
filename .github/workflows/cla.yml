name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  checks: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        with:
          path-to-document: "https://github.com/sky-ai-eng/triage-factory/blob/main/docs/CLA.md"
          path-to-signatures: "signatures/cla.json"
          branch: "cla-signatures"
          allowlist: "AidanAllchin,sky-ai-bot,dependabot[bot],github-actions[bot],claude[bot]"
